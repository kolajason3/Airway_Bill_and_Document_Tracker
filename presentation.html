<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWB-DT Final Presentation: Complete System Demo & Project Closure</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    /* Color Palette - Premium Warm/Cool Slate hybrid */
    --bg-primary-dark: #0f172a;
    --bg-secondary-dark: #1e293b;
    --text-primary-dark: #f8fafc;
    --text-secondary-dark: #94a3b8;
    --accent-dark: #f43f5e;
    --accent-light-dark: #ffe4e6;
    --border-dark: #334155;
    
    --bg-primary-light: #f8fafc;
    --bg-secondary-light: #ffffff;
    --text-primary-light: #0f172a;
    --text-secondary-light: #475569;
    --accent-light: #e11d48;
    --accent-light-light: #fff1f2;
    --border-light: #e2e8f0;

    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;

    --transition-speed: 0.4s;
    --transition-curve: cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Themes */
  body.dark {
    --bg-primary: var(--bg-primary-dark);
    --bg-secondary: var(--bg-secondary-dark);
    --text-primary: var(--text-primary-dark);
    --text-secondary: var(--text-secondary-dark);
    --accent: var(--accent-dark);
    --accent-bg: #e11d4820;
    --border: var(--border-dark);
    --card-bg: rgba(30, 41, 59, 0.7);
    --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
    --grid-bg: radial-gradient(rgba(51, 65, 85, 0.15) 1px, transparent 0);
  }

  body.light {
    --bg-primary: var(--bg-primary-light);
    --bg-secondary: var(--bg-secondary-light);
    --text-primary: var(--text-primary-light);
    --text-secondary: var(--text-secondary-light);
    --accent: var(--accent-light);
    --accent-bg: var(--accent-light-light);
    --border: var(--border-light);
    --card-bg: rgba(255, 255, 255, 0.85);
    --shadow: 0 8px 32px 0 rgba(148, 163, 184, 0.15);
    --grid-bg: radial-gradient(rgba(226, 232, 240, 0.8) 1px, transparent 0);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-sans);
    background-color: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    display: flex;
    transition: background-color 0.5s ease, color 0.5s ease;
  }

  /* Background Grid Effect */
  .grid-pattern {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: var(--grid-bg);
    background-size: 24px 24px;
    z-index: 1;
    pointer-events: none;
    opacity: 0.8;
  }

  /* MAIN WORKSPACE */
  .app-container {
    display: flex;
    width: 100%;
    height: 100%;
    z-index: 2;
    position: relative;
  }

  /* SIDEBAR NAVIGATION */
  .sidebar {
    width: 280px;
    background-color: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    z-index: 10;
    transition: width var(--transition-speed) var(--transition-curve), background-color 0.5s ease, border-color 0.5s ease;
  }

  .sidebar.collapsed {
    width: 0;
    overflow: hidden;
    border-right: none;
  }

  .sidebar-header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h2 {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 700;
  }

  .sidebar-header p {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-top: 4px;
  }

  .slide-list {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    list-style: none;
  }

  .slide-item {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-secondary);
    cursor: pointer;
    margin-bottom: 4px;
    transition: all 0.2s ease;
  }

  .slide-item:hover {
    background-color: var(--accent-bg);
    color: var(--accent);
  }

  .slide-item.active {
    background-color: var(--accent);
    color: #fff;
    font-weight: 500;
  }

  .slide-item .num {
    font-family: var(--font-mono);
    font-size: 11px;
    margin-right: 10px;
    opacity: 0.7;
    width: 20px;
  }

  .sidebar-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-secondary);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  /* PRESENTATION STAGE */
  .presentation-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    position: relative;
  }

  /* TOP CONTROLS */
  .top-navbar {
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    border-bottom: 1px solid var(--border);
    background-color: var(--bg-secondary);
    transition: background-color 0.5s ease, border-color 0.5s ease;
  }

  .nav-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-primary);
    padding: 8px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s ease;
  }

  .btn:hover {
    background-color: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn.primary {
    background-color: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .btn.primary:hover {
    background-color: #be123c;
    color: #fff;
  }

  .btn-icon {
    width: 32px;
    height: 32px;
    padding: 0;
    justify-content: center;
    border-radius: 50%;
  }

  /* SLIDE CONTAINER & SCALING */
  .slide-viewport {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  /* Aspect-ratio locked presentation slide card */
  .slide-container {
    width: 1200px;
    height: 750px;
    background-color: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    backdrop-filter: blur(16px);
    display: flex;
    flex-direction: column;
    padding: 48px;
    position: relative;
    overflow: hidden;
    transition: opacity 0.3s ease, transform 0.3s ease, background-color 0.5s ease, border-color 0.5s ease;
  }

  /* Transitions */
  .slide-container.fade-out {
    opacity: 0;
    transform: translateY(10px) scale(0.98);
  }

  .slide-container.fade-in {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  /* SLIDE TYPOGRAPHY & LAYOUTS */
  .slide-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .slide-title {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 700;
    line-height: 1.25;
    margin-bottom: 24px;
    border-bottom: 2px solid var(--accent);
    padding-bottom: 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }

  .slide-title span.duration {
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 500;
    background-color: var(--accent-bg);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    letter-spacing: 0;
  }

  .slide-content {
    flex: 1;
    overflow-y: auto;
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--text-primary);
  }

  /* Slide Grids & Elements */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    height: 100%;
  }

  .three-col {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
  }

  .card-bullet {
    background-color: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border);
    padding: 16px;
    border-radius: 10px;
    margin-bottom: 12px;
    transition: transform 0.2s ease, border-color 0.2s ease;
  }

  body.light .card-bullet {
    background-color: rgba(0, 0, 0, 0.02);
  }

  .card-bullet:hover {
    transform: translateX(4px);
    border-color: var(--accent);
  }

  .card-bullet h4 {
    font-size: 14.5px;
    font-weight: 600;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-bullet h4 span {
    background-color: var(--accent);
    color: white;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-family: var(--font-mono);
  }

  .card-bullet p {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* CODE BOX */
  .code-container {
    background-color: #0b0f19;
    border: 1px solid #1e293b;
    border-radius: 8px;
    font-family: var(--font-mono);
    font-size: 11.5px;
    line-height: 1.5;
    padding: 16px;
    overflow: auto;
    color: #e2e8f0;
    height: 100%;
    max-height: 380px;
  }

  /* TIMELINE SEGMENTS */
  .slide-timeline {
    display: flex;
    width: 100%;
    margin-bottom: 24px;
    border-radius: 6px;
    overflow: hidden;
    font-family: var(--font-mono);
    font-size: 11px;
    text-align: center;
  }

  .slide-timeline .seg {
    padding: 8px 4px;
    color: #fff;
    font-weight: 500;
  }

  /* VERIFICATION TABLE */
  .slide-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }

  .slide-table th {
    padding: 8px 12px;
    background-color: var(--bg-secondary);
    border-bottom: 2px solid var(--border);
    text-align: left;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 1px;
  }

  .slide-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }

  .slide-table tr:nth-child(even) {
    background-color: rgba(0, 0, 0, 0.015);
  }

  body.dark .slide-table tr:nth-child(even) {
    background-color: rgba(255, 255, 255, 0.015);
  }

  .badge {
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    display: inline-block;
  }

  .badge.pass { background-color: #d1fae5; color: #065f46; }
  .badge.alert { background-color: #fee2e2; color: #991b1b; }
  .badge.wip { background-color: #fef3c7; color: #92400e; }
  .badge.role { background-color: #e0f2fe; color: #075985; }

  /* BOTTOM CONTROLS & PROGRESS */
  .bottom-navbar {
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px;
    border-top: 1px solid var(--border);
    background-color: var(--bg-secondary);
    z-index: 10;
    transition: background-color 0.5s ease, border-color 0.5s ease;
  }

  .progress-track {
    flex: 1;
    margin: 0 40px;
    height: 4px;
    background-color: var(--border);
    border-radius: 2px;
    position: relative;
    cursor: pointer;
  }

  .progress-fill {
    height: 100%;
    background-color: var(--accent);
    width: 0%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* DIAGRAM STYLING */
  .diagram-container {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background-color: rgba(0, 0, 0, 0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    position: relative;
  }
  
  body.dark .diagram-container {
    background-color: rgba(255, 255, 255, 0.01);
  }

  /* PRINT STYLE SHEETS */
  @media print {
    body {
      background: white !important;
      color: black !important;
      overflow: visible !important;
      height: auto !important;
      width: auto !important;
    }

    .grid-pattern, .sidebar, .top-navbar, .bottom-navbar, .btn {
      display: none !important;
    }

    .app-container {
      display: block !important;
    }

    .presentation-stage {
      display: block !important;
      height: auto !important;
    }

    .slide-viewport {
      padding: 0 !important;
      display: block !important;
      overflow: visible !important;
    }

    .slide-container {
      width: 100% !important;
      height: 100vh !important; /* Forces landscape print fit */
      page-break-after: always !important;
      break-after: page !important;
      border: none !important;
      box-shadow: none !important;
      background: transparent !important;
      padding: 40px !important;
      transform: none !important;
      opacity: 1 !important;
      display: flex !important;
      flex-direction: column !important;
    }

    .code-container {
      max-height: none !important;
      overflow: visible !important;
      background: #fafafa !important;
      color: #000 !important;
      border: 1px solid #ddd !important;
    }
  }
</style>
</head>

  // Application State
  let currentSlideIndex = 0;

  // Initialize Sidebar List Items
  function initSidebar() {
    slideList.innerHTML = '';
    SLIDES.forEach((slide, idx) => {
      const li = document.createElement('li');
      li.className = `slide-item ${idx === currentSlideIndex ? 'active' : ''}`;
      li.innerHTML = `
        <span class="num">${String(idx + 1).padStart(2, '0')}</span>
        <span>${slide.title}</span>
      `;
      li.addEventListener('click', () => jumpToSlide(idx));
      slideList.appendChild(li);
    });
  }

  // Render Active Slide
  function renderSlide() {
    const slide = SLIDES[currentSlideIndex];
    
    // Add slide fade animation class
    slideCard.classList.add('fade-out');
    
    setTimeout(() => {
      slideCard.innerHTML = `
        <div class="slide-label">
          <span>${slide.label} of ${String(SLIDES.length).padStart(2, '0')}</span>
          <span style="font-weight:600; letter-spacing:0.5px;">AWB-DT Final Review</span>

        <h2 class="slide-title">
          ${slide.title}
          <span class="duration">${slide.duration}</span>
        </h2>
        <div class="slide-content">
          ${slide.content}
        </div>
      `;
      
      slideCard.classList.remove('fade-out');
      slideCard.classList.add('fade-in');
    }, 150);

    // Update sidebar items
    const items = slideList.querySelectorAll('.slide-item');
    items.forEach((item, idx) => {
      if (idx === currentSlideIndex) {
        item.classList.add('active');
        item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } else {
        item.classList.remove('active');
      }
    });

    // Update progress bar
    const percentage = ((currentSlideIndex + 1) / SLIDES.length) * 100;
    progressFill.style.width = `${percentage}%`;

    // Update button states
    prevBtn.disabled = currentSlideIndex === 0;
    nextBtn.disabled = currentSlideIndex === SLIDES.length - 1;
  }

  // Navigation Logic
  function jumpToSlide(index) {
    if (index >= 0 && index < SLIDES.length) {
      currentSlideIndex = index;
      renderSlide();
    }
  }

  // Next Slide Logic with boundary check
  function nextSlide() {
    if (currentSlideIndex < SLIDES.length - 1) {
      currentSlideIndex++;
      renderSlide();
    }
  }

  // Prev Slide Logic with boundary check
  function prevSlide() {
    if (currentSlideIndex > 0) {
      currentSlideIndex--;
      renderSlide();
    }
  }

  // Event Listeners
  prevBtn.addEventListener('click', prevSlide);
  nextBtn.addEventListener('click', nextSlide);

  // Keyboard navigation
  window.addEventListener('keydown', (e) => {
    switch (e.key) {
      case 'ArrowRight':
      case ' ':
        nextSlide();
        e.preventDefault();
        break;
      case 'ArrowLeft':
      case 'Backspace':
        prevSlide();
        e.preventDefault();
        break;
      case 'Home':
        jumpToSlide(0);
        e.preventDefault();
        break;
      case 'End':
        jumpToSlide(SLIDES.length - 1);
        e.preventDefault();
        break;
      case '?':
        alert(`Keyboard Shortcuts:
&bull; Right Arrow / Space: Next Slide
&bull; Left Arrow / Backspace: Previous Slide
&bull; Home: First Slide
&bull; End: Last Slide
&bull; Ctrl + P: Export as PDF / Print`);
        break;
    }
  });

  // Track click to jump slide
  progressTrack.addEventListener('click', (e) => {
    const rect = progressTrack.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    const ratio = clickX / rect.width;
    const targetIdx = Math.floor(ratio * SLIDES.length);
    jumpToSlide(targetIdx);
  });

  // Sidebar toggle
  sidebarToggle.addEventListener('click', () => {
    sidebar.classList.toggle('collapsed');
  });

  // Theme toggle (Dark / Light)
  themeToggle.addEventListener('click', () => {
    if (document.body.classList.contains('dark')) {
      document.body.classList.remove('dark');
      document.body.classList.add('light');
      themeToggle.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M6.34 17.66l-1.41 1.41m12.72-12.72l-1.41 1.41"/></svg>`;
    } else {
      document.body.classList.remove('light');
      document.body.classList.add('dark');
      themeToggle.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>`;
    }
  });

  // Fullscreen toggle
  fullscreenToggle.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(err => {
        alert(`Error enabling full-screen mode: ${err.message}`);
      });
    } else {
      document.exitFullscreen();
    }
  });

  // Scale slide viewport to fit presentation container
  function scaleSlide() {
    const viewport = document.querySelector('.slide-viewport');
    const container = document.getElementById('slide-card');
    const scaleX = viewport.clientWidth / 1280;
    const scaleY = viewport.clientHeight / 830;
    const scale = Math.min(scaleX, scaleY);
    container.style.transform = `scale(${scale})`;
    container.style.transformOrigin = 'center center';
  }

  window.addEventListener('resize', scaleSlide);

  // Initialize
  initSidebar();
  renderSlide();
  setTimeout(scaleSlide, 100);

</script>
</body>
</html>
